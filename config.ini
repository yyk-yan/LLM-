# 项目配置文件

[project]
name = 智能文档填表系统
version = 1.0.0
description = 基于 AI 的智能文档理解与自动填表系统
author = Your Name
license = MIT

[backend]
host = 0.0.0.0
port = 8000
reload = true
workers = 1

[api]
timeout = 90
max_retries = 3
chunk_size = 2000
max_workers = 6

[files]
upload_dir = backend/uploads
output_dir = outputs
max_file_size = 52428800  # 50MB in bytes
allowed_extensions = docx,xlsx,xls,md,txt

[deepseek]
model = deepseek-chat
temperature = 0.1
max_tokens = 8000
